services:
  db:
    image: postgres:13
    container_name: histopath-db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=histopath
      - POSTGRES_USER=histopath
      - POSTGRES_PASSWORD=histopath_password
    networks:
      - default
      - cloud_apps
    restart: unless-stopped

  web:
    build: .
    container_name: histopath-web
    command: ["/code/entrypoint.sh"]
    volumes:
      - .:/code
    ports:
      - "${PORT:-8001}:${PORT:-8001}"
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - django_secret_key
    environment:
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: shoestring
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      PORT: "${PORT:-8001}"
      ENABLE_DATA_OUTPUT_LISTENER: "0"
      FORCE_SCRIPT_NAME: /histopath
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: histopath
      DB_USER: histopath
      DB_PASSWORD: histopath_password
      DB_HOST: db
      DB_PORT: 5432
    networks:
      - default
      - cloud_apps

networks:
  default:
  cloud_apps:
    external: true
    name: digitalhospitalscloud_apps
