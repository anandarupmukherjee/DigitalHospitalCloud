services:
  web:
    build: .
    container_name: logistics-tracking-web
    env_file:
      - .env
    environment:
      SERVICE_ROLE: web
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    restart: unless-stopped
  listener:
    build: .
    container_name: logistics-tracking-listener
    env_file:
      - .env
    environment:
      SERVICE_ROLE: listener
      DJANGO_COLLECTSTATIC: "0"
    volumes:
      - .:/app
    depends_on:
      - web
    restart: unless-stopped

volumes:
  static_volume:
